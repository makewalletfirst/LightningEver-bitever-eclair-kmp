name: Kotlin KMP Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Clone and Install bitcoin-kmp (Dependency)
        run: |
          git clone https://github.com/ACINQ/bitcoin-kmp.git
          cd bitcoin-kmp
          # 'test' 태스크가 없을 수 있으므로 옵션 없이 실행하거나 안전한 스킵 사용
          ./gradlew publishToMavenLocal -x check
          cd ..

      - name: Build eclair-kmp (Assemble Only)
        run: |
          # 모든 테스트 관련 작업을 명시적으로 제외하고 assemble만 수행합니다.
          ./gradlew assemble -x test -x jvmTest -x linuxX64Test -x linuxArm64Test -x check

name: Kotlin KMP Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Clone and Install bitcoin-kmp (Dependency)
        run: |
          git clone https://github.com/ACINQ/bitcoin-kmp.git
          cd bitcoin-kmp
          ./gradlew publishToMavenLocal -x test -x check
          cd ..

      - name: Build eclair-kmp (JVM/Android Targets)
        run: |
          # 네이티브 타겟 제외하고 JVM 타겟만 우선 빌드하여 성공 여부 확인
          ./gradlew :lightning-kmp-core:jvmJar -x test -x check

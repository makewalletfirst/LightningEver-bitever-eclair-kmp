name: Kotlin KMP Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Clone and Install bitcoin-kmp (Dependency)
        run: |
          git clone https://github.com/ACINQ/bitcoin-kmp.git
          cd bitcoin-kmp
          # 멀티플랫폼 프로젝트에서는 'allTests' 또는 'check'를 제외합니다.
          ./gradlew publishToMavenLocal -x allTests -x check
          cd ..

      - name: Build eclair-kmp (Assemble Only)
        run: |
          # 'test' 대신 'allTests'를 제외하여 빌드만 수행합니다.
          ./gradlew assemble -x allTests -x check

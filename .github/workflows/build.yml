name: Kotlin KMP Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Clone and Install bitcoin-kmp (Dependency)
        run: |
          git clone https://github.com/ACINQ/bitcoin-kmp.git
          cd bitcoin-kmp
          # 가장 안전한 배포 명령 실행
          ./gradlew publishToMavenLocal
          cd ..

      - name: Build eclair-kmp (Assemble Only)
        run: |
          # 테스트 제외 옵션 없이 오직 바이너리 생성(assemble)만 수행
          ./gradlew assemble

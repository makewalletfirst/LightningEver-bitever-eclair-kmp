name: Kotlin KMP Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Clone and Install bitcoin-kmp (Dependency)
        run: |
          git clone https://github.com/ACINQ/bitcoin-kmp.git
          cd bitcoin-kmp
          ./gradlew publishToMavenLocal -x test

      - name: Build eclair-kmp (Assemble Only)
        run: |
          # build 대신 assemble을 사용하여 테스트를 건너뛰고 바이너리만 생성합니다.
          ./gradlew assemble -x test -x linuxX64Test -x jvmTest
